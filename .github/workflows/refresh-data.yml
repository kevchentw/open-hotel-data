name: Refresh Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run sync:hotels
      - run: npm run sync:prices
